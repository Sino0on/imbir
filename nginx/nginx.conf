# /etc/nginx/sites-available/imbir.conf
# Ссылку создавать: ln -s /etc/nginx/sites-available/imbir.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name imbir.sino0on.ru www.imbir.sino0on.ru;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Редирект на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name imbir.sino0on.ru www.imbir.sino0on.ru;

    ssl_certificate     /etc/letsencrypt/live/imbir.sino0on.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imbir.sino0on.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Статика (из тома Docker или локальная папка)
    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    # ── WebSocket — ОБЯЗАТЕЛЬНО ПЕРЕД location / ──────────────────────────────
    location /ws/ {
        proxy_pass http://127.0.0.1:8114;

        # Всё ниже — обязательный минимум для WS-хендшейка
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Держим WS-соединение открытым до 24 ч
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── HTTP API ──────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8114;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
