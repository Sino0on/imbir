server {
    server_name imbir.sino0on.ru www.imbir.sino0on.ru;

    client_max_body_size 500M;

    location /static/ {
        root /var/www/imbir/;
    }

    # ── WebSocket — ОБЯЗАТЕЛЬНО ПЕРЕД location / ──────────────────────────────
    location /ws/ {
        proxy_pass http://localhost:8114;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── HTTP API ──────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://localhost:8114;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/imbir.sino0on.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/imbir.sino0on.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = imbir.sino0on.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name imbir.sino0on.ru www.imbir.sino0on.ru;
    listen 80;
    return 404; # managed by Certbot
}
